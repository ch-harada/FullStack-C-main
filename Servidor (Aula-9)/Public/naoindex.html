<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Sevidor Boladão</title>
        <link href="estilo.css" rel="stylesheet">
    </head>
    <body>
        <h1>Servidor Boladão ta no procedimento...</h1>
        <h2>Carlos Harada</h2>

        <h3>Exemplos de formulários</h3>

        <form action="/inicio">
            <input type="text" name="text">
            <br>
            <input type="number" name="numero">
            <br>
            <input type="checkbox" name="cb">
            <input type="radio" name="rd">
            <br>
            <input type="color">
            <br>
            <input type="date">
            <br>
            <input type="email">
            <br>
            <input type="password">
            <br>
            <input type="submit" value="enviar por Post" formmethod ="post">  
            <input type="submit" value="enviar por Get" formmethod="get">
        </form>

        <h3>Exemplo de Cadastro</h3>
        <form method="post" action="/cadastro">
            <p>Nome: <input type="text" name="nome"></p>
            <br>
            <p>Login: <input type="text" name="login"></p>
            <br>
            <p>Senha: <input type="password" name="senha"></p>
            <br>
            <input type="submit" value="Cadastrar">
        </form>


        <h3>Exemplo de uso de for no ejs</h3>
        <form method="get" action="/for">
            <p>Indique a quantidade de DIVs: <input type="number" name="qtde"></p>
            <br>
            <input type="submit">
        </form>
    </body>
</html>

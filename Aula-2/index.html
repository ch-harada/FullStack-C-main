<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Aula 2</title>
        <!--pode-se criar uma tag style para colocar todas as mudanças em um lugar só, afetando todas daquela tag ou não-->
        <!--
        <style>
            p{
                color:blue;
                background-color: gray;
            }
        </style>
        -->

        <!--link para o indexStyle css (outro arquivo) que será usado para style-->
        <link rel="stylesheet" href="indexStyle.css">
    </head>
    <body>
        <!--pode-se colocar style dentro da tag selecionada, que afetará apenas aquela tag-->
        <h1 style="color: crimson;font-size: 2cm;">Aula 2</h1>
        <h1>Aula 2</h1>
        <p>Exemplo de Estilização</p>
        <!--pode colocar ids dentro das tags para diferenciar elas e colocar style apenas nas tags daquele id, id é unico para uma tag-->
        <p id="p1">Esse é o ID p1</p>
        <p id="p2">Esse é o ID p2</p>

        <!--pode se criar uma div para separar conteudos do site, e colocar uma classe dentro da div para alterar
         o style de todos dessa classe-->

            <h1 class="d1">Corinthians</h1>
            <p class="d1">Caxias do Sul</p>

            <a href="https://youtube.com">Youtube</a>
    </body>
</html>
